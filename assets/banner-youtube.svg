<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1440" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#005A8C"/>
      <stop offset="40%" stop-color="#0077B6"/>
      <stop offset="70%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#48CAE4"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD200"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="2560" height="1440" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="2200" cy="200" r="300" fill="rgba(255,210,0,0.04)"/>
  <circle cx="400" cy="1200" r="250" fill="rgba(255,255,255,0.03)"/>

  <!-- Waves -->
  <path d="M0,1200 Q320,1100 640,1200 Q960,1300 1280,1200 Q1600,1100 1920,1200 Q2240,1300 2560,1200 L2560,1440 L0,1440Z" fill="rgba(255,255,255,0.06)"/>
  <path d="M0,1280 Q400,1180 800,1280 Q1200,1380 1600,1280 Q2000,1180 2560,1280 L2560,1440 L0,1440Z" fill="rgba(255,255,255,0.04)"/>

  <!-- Sun -->
  <circle cx="2100" cy="350" r="100" fill="url(#sun)" opacity="0.7"/>

  <!-- Barika Hel silhouette -->
  <g transform="translate(400, 500) scale(2.5)">
    <ellipse cx="0" cy="20" rx="22" ry="30" fill="rgba(255,255,255,0.15)" transform="rotate(-10)"/>
    <circle cx="-20" cy="-10" r="16" fill="rgba(255,255,255,0.15)"/>
    <circle cx="-24" cy="-12" r="5" fill="rgba(255,255,255,0.2)"/>
    <path d="M-36,-6 L-48,-8 L-44,-4 L-36,-2Z" fill="rgba(255,255,255,0.2)"/>
  </g>

  <!-- Main text -->
  <text x="750" y="520" font-family="'Playfair Display',Georgia,serif" font-size="140" font-weight="600" fill="white" letter-spacing="6">BlueWave</text>
  <text x="750" y="660" font-family="'DM Sans',sans-serif" font-size="48" fill="#FFD200" letter-spacing="12" font-weight="700">CURAÇAO</text>
  <text x="750" y="740" font-family="'DM Sans',sans-serif" font-size="32" fill="rgba(255,255,255,0.7)" letter-spacing="4">Good Vibes on Solana</text>
  <text x="750" y="800" font-family="'DM Sans',sans-serif" font-size="24" fill="#90E0EF" letter-spacing="8">$BLUEW</text>

  <!-- Decorative line -->
  <rect x="750" y="680" width="120" height="4" rx="2" fill="#FFD200" opacity="0.5"/>

  <!-- CTA box -->
  <rect x="750" y="870" width="260" height="60" rx="30" fill="#FFD200"/>
  <text x="880" y="908" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="24" font-weight="700" fill="#005A8C">BUY BLUEW</text>
</svg>
