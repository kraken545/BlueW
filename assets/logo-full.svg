<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Curaçao ocean gradient -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0077B6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00B4D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#48CAE4;stop-opacity:1" />
    </linearGradient>
    <!-- Sun gradient -->
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD200;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B00;stop-opacity:1" />
    </linearGradient>
    <!-- Sky gradient -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90E0EF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#CAF0F8;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="250" cy="250" r="240" fill="url(#skyGrad)" stroke="url(#waveGrad)" stroke-width="3"/>

  <!-- Sun -->
  <circle cx="380" cy="120" r="35" fill="url(#sunGrad)" opacity="0.9"/>
  <!-- Sun rays -->
  <g stroke="#FFD200" stroke-width="2" opacity="0.5">
    <line x1="380" y1="70" x2="380" y2="60"/>
    <line x1="380" y1="170" x2="380" y2="180"/>
    <line x1="330" y1="120" x2="320" y2="120"/>
    <line x1="430" y1="120" x2="440" y2="120"/>
    <line x1="345" y1="85" x2="338" y2="78"/>
    <line x1="415" y1="155" x2="422" y2="162"/>
    <line x1="415" y1="85" x2="422" y2="78"/>
    <line x1="345" y1="155" x2="338" y2="162"/>
  </g>

  <!-- Barika Hel (Prikichi parrot - Yellow-shouldered Amazon) -->
  <g transform="translate(250, 135)">
    <!-- Body -->
    <ellipse cx="0" cy="20" rx="22" ry="30" fill="#228B22" transform="rotate(-10)"/>
    <!-- Belly -->
    <ellipse cx="-2" cy="25" rx="14" ry="20" fill="#90EE90" transform="rotate(-10)"/>
    <!-- Head -->
    <circle cx="-20" cy="-10" r="16" fill="#228B22"/>
    <!-- Yellow forehead -->
    <path d="M-36,-10 A16,16 0 0,1 -16,-26" fill="#FFD700" stroke="none"/>
    <!-- Yellow crown -->
    <path d="M-30,-22 Q-20,-30 -12,-24" fill="#FFD700" stroke="none"/>
    <!-- White eye ring -->
    <circle cx="-24" cy="-12" r="6" fill="white"/>
    <!-- Eye -->
    <circle cx="-24" cy="-12" r="3" fill="#1a1a1a"/>
    <circle cx="-23" cy="-13" r="1" fill="white"/>
    <!-- Upper beak -->
    <path d="M-36,-6 L-48,-8 L-44,-4 L-36,-2 Z" fill="#2a2a2a"/>
    <!-- Lower beak -->
    <path d="M-36,-2 L-44,-4 L-40,0 L-34,0 Z" fill="#4a4a4a"/>
    <!-- Wing -->
    <ellipse cx="8" cy="15" rx="18" ry="12" fill="#006400" transform="rotate(-20, 8, 15)"/>
    <!-- Yellow wing patch -->
    <ellipse cx="12" cy="12" rx="8" ry="6" fill="#FFD700" opacity="0.8" transform="rotate(-15, 12, 12)"/>
    <!-- Tail -->
    <path d="M10,45 L15,65 L5,65 L2,45 Z" fill="#006400"/>
    <!-- Feet -->
    <line x1="-5" y1="48" x2="-8" y2="55" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="49" x2="0" y2="56" stroke="#333" stroke-width="2"/>
    <line x1="5" y1="48" x2="8" y2="55" stroke="#333" stroke-width="2"/>
  </g>

  <!-- Waves -->
  <g transform="translate(0, 280)">
    <!-- Wave 1 - back -->
    <path d="M0,40 Q50,0 100,40 Q150,80 200,40 Q250,0 300,40 Q350,80 400,40 Q450,0 500,40 L500,80 L0,80 Z"
          fill="url(#waveGrad)" opacity="0.4"/>
    <!-- Wave 2 - middle -->
    <path d="M0,55 Q60,20 120,55 Q180,90 240,55 Q300,20 360,55 Q420,90 480,55 L500,55 L500,100 L0,100 Z"
          fill="url(#waveGrad)" opacity="0.6"/>
    <!-- Wave 3 - front -->
    <path d="M0,70 Q40,40 80,70 Q120,100 160,70 Q200,40 240,70 Q280,100 320,70 Q360,40 400,70 Q440,100 480,70 L500,70 L500,120 L0,120 Z"
          fill="url(#waveGrad)" opacity="0.9"/>
  </g>

  <!-- Text: BlueWave -->
  <g transform="translate(250, 400)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="52"
          font-weight="900" fill="url(#waveGrad)" letter-spacing="3">
      BlueWave
    </text>
    <!-- Subtitle -->
    <text x="0" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="14"
          fill="#0077B6" letter-spacing="6" font-weight="bold">
      CURAÇAO
    </text>
  </g>

  <!-- Small decorative dots -->
  <circle cx="100" cy="200" r="3" fill="#FFD200" opacity="0.6"/>
  <circle cx="400" cy="200" r="3" fill="#FFD200" opacity="0.6"/>
  <circle cx="420" cy="230" r="2" fill="#FFD200" opacity="0.4"/>
  <circle cx="80" cy="230" r="2" fill="#FFD200" opacity="0.4"/>
</svg>
