<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0077B6"/>
      <stop offset="50%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#48CAE4"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD200"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0077B6"/>
      <stop offset="50%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#0077B6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="300" cy="300" r="290" fill="#F0F8FF"/>
  <circle cx="300" cy="300" r="280" fill="white" stroke="url(#bg)" stroke-width="6"/>

  <!-- Sun rays -->
  <g stroke="#FFD200" stroke-width="3" opacity="0.3" stroke-linecap="round">
    <line x1="460" y1="140" x2="490" y2="110"/>
    <line x1="480" y1="160" x2="520" y2="150"/>
    <line x1="140" y1="140" x2="110" y2="110"/>
    <line x1="120" y1="160" x2="80" y2="150"/>
  </g>

  <!-- Sun -->
  <circle cx="430" cy="160" r="40" fill="url(#sun)" opacity="0.85" filter="url(#glow)"/>

  <!-- Barika Hel (Prikichi parrot) -->
  <g transform="translate(300, 180)">
    <!-- Tail -->
    <path d="M25,70 Q35,100 45,120 Q30,105 20,75Z" fill="#006400"/>
    <path d="M15,65 Q20,95 25,115 Q15,100 12,70Z" fill="#004d00"/>

    <!-- Body -->
    <ellipse cx="0" cy="30" rx="28" ry="38" fill="#228B22" transform="rotate(-8)"/>
    <ellipse cx="-4" cy="36" rx="18" ry="26" fill="#90EE90" transform="rotate(-8)"/>

    <!-- Wing -->
    <ellipse cx="12" cy="25" rx="22" ry="15" fill="#006400" transform="rotate(-20,12,25)"/>
    <ellipse cx="16" cy="22" rx="10" ry="8" fill="#FFD700" opacity="0.7" transform="rotate(-15,16,22)"/>

    <!-- Head -->
    <circle cx="-28" cy="-12" r="22" fill="#228B22"/>
    <!-- Yellow crown -->
    <path d="M-50,-12 Q-42,-35 -20,-32" fill="#FFD700"/>
    <path d="M-45,-25 Q-35,-40 -18,-34" fill="#FFD700" opacity="0.8"/>
    <!-- White eye ring -->
    <circle cx="-34" cy="-16" r="9" fill="white"/>
    <!-- Eye -->
    <circle cx="-34" cy="-16" r="5" fill="#1a1a1a"/>
    <circle cx="-32" cy="-18" r="2" fill="white"/>
    <!-- Upper beak -->
    <path d="M-50,-4 L-64,-6 L-58,-2 L-48,0Z" fill="#2a2a2a"/>
    <!-- Lower beak -->
    <path d="M-48,0 L-58,-2 L-54,2 L-46,3Z" fill="#4a4a4a"/>
    <!-- Feet -->
    <line x1="-12" y1="65" x2="-16" y2="75" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="-4" y1="66" x2="-6" y2="76" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="4" y1="65" x2="6" y2="75" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Waves at bottom -->
  <g transform="translate(0, 380)">
    <path d="M0,30 Q60,0 120,30 Q180,60 240,30 Q300,0 360,30 Q420,60 480,30 Q540,0 600,30 L600,80 L0,80Z" fill="url(#bg)" opacity="0.25"/>
    <path d="M0,45 Q75,15 150,45 Q225,75 300,45 Q375,15 450,45 Q525,75 600,45 L600,90 L0,90Z" fill="url(#bg)" opacity="0.4"/>
    <path d="M0,60 Q50,35 100,60 Q150,85 200,60 Q250,35 300,60 Q350,85 400,60 Q450,35 500,60 Q550,85 600,60 L600,100 L0,100Z" fill="url(#bg)" opacity="0.7"/>
  </g>

  <!-- Stars / sparkles -->
  <circle cx="130" cy="280" r="3" fill="#FFD200" opacity="0.5"/>
  <circle cx="470" cy="280" r="3" fill="#FFD200" opacity="0.5"/>
  <circle cx="160" cy="310" r="2" fill="#FFD200" opacity="0.3"/>
  <circle cx="440" cy="310" r="2" fill="#FFD200" opacity="0.3"/>

  <!-- BlueWave text -->
  <g transform="translate(300, 490)">
    <text x="0" y="0" text-anchor="middle" font-family="'Playfair Display',Georgia,serif" font-size="64" font-weight="600" fill="url(#textGrad)" letter-spacing="4">BlueWave</text>
    <rect x="-80" y="12" width="160" height="2" rx="1" fill="url(#sun)" opacity="0.6"/>
    <text x="0" y="34" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="14" fill="#00B4D8" letter-spacing="8" font-weight="700">CURAÇAO</text>
    <text x="0" y="54" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#FFD200" letter-spacing="6" font-weight="600">BLUEW</text>
  </g>
</svg>
