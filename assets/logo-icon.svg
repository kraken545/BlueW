<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0077B6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00B4D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#48CAE4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD200;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B00;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="250" cy="250" r="240" fill="white" stroke="url(#waveGrad)" stroke-width="4"/>

  <!-- Sun -->
  <circle cx="380" cy="130" r="30" fill="url(#sunGrad)" opacity="0.8"/>
  <g stroke="#FFD200" stroke-width="2" opacity="0.4">
    <line x1="380" y1="85" x2="380" y2="75"/>
    <line x1="380" y1="175" x2="380" y2="185"/>
    <line x1="335" y1="130" x2="325" y2="130"/>
    <line x1="425" y1="130" x2="435" y2="130"/>
    <line x1="348" y1="98" x2="341" y2="91"/>
    <line x1="412" y1="162" x2="419" y2="169"/>
    <line x1="412" y1="98" x2="419" y2="91"/>
    <line x1="348" y1="162" x2="341" y2="169"/>
  </g>

  <!-- Barika Hel (Prikichi parrot) -->
  <g transform="translate(250, 150)">
    <ellipse cx="0" cy="20" rx="22" ry="30" fill="#228B22" transform="rotate(-10)"/>
    <ellipse cx="-2" cy="25" rx="14" ry="20" fill="#90EE90" transform="rotate(-10)"/>
    <circle cx="-20" cy="-10" r="16" fill="#228B22"/>
    <path d="M-36,-10 A16,16 0 0,1 -16,-26" fill="#FFD700"/>
    <path d="M-30,-22 Q-20,-30 -12,-24" fill="#FFD700"/>
    <circle cx="-24" cy="-12" r="6" fill="white"/>
    <circle cx="-24" cy="-12" r="3" fill="#1a1a1a"/>
    <circle cx="-23" cy="-13" r="1" fill="white"/>
    <path d="M-36,-6 L-48,-8 L-44,-4 L-36,-2 Z" fill="#2a2a2a"/>
    <path d="M-36,-2 L-44,-4 L-40,0 L-34,0 Z" fill="#4a4a4a"/>
    <ellipse cx="8" cy="15" rx="18" ry="12" fill="#006400" transform="rotate(-20, 8, 15)"/>
    <ellipse cx="12" cy="12" rx="8" ry="6" fill="#FFD700" opacity="0.8" transform="rotate(-15, 12, 12)"/>
    <path d="M10,45 L15,65 L5,65 L2,45 Z" fill="#006400"/>
    <line x1="-5" y1="48" x2="-8" y2="55" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="49" x2="0" y2="56" stroke="#333" stroke-width="2"/>
    <line x1="5" y1="48" x2="8" y2="55" stroke="#333" stroke-width="2"/>
  </g>

  <!-- Waves -->
  <g transform="translate(0, 300)">
    <path d="M0,30 Q50,0 100,30 Q150,60 200,30 Q250,0 300,30 Q350,60 400,30 Q450,0 500,30 L500,70 L0,70 Z"
          fill="url(#waveGrad)" opacity="0.3"/>
    <path d="M0,45 Q60,15 120,45 Q180,75 240,45 Q300,15 360,45 Q420,75 480,45 L500,45 L500,90 L0,90 Z"
          fill="url(#waveGrad)" opacity="0.5"/>
    <path d="M0,60 Q40,35 80,60 Q120,85 160,60 Q200,35 240,60 Q280,85 320,60 Q360,35 400,60 Q440,85 480,60 L500,60 L500,110 L0,110 Z"
          fill="url(#waveGrad)" opacity="0.8"/>
  </g>
</svg>
