version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: bluewave-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_METRICS=false
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-America/Curacao}
      - DB_TYPE=sqlite
      - DB_SQLITE_DATABASE=/home/node/.n8n/database.sqlite
    volumes:
      - n8n_data:/home/node/.n8n
      - ../../assets:/home/node/assets
      - ../../output:/home/node/output
      - ../../src/scripts:/home/node/scripts
    networks:
      - bluewave-net

networks:
  bluewave-net:
    driver: bridge

volumes:
  n8n_data:
